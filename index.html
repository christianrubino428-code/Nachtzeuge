// ========== FFMPEG.WASM (Lazy-Loaded für MP4-Konvertierung) ==========
let ffmpegInstance = null;
let ffmpegLoading = false;

async function loadFFmpeg() {
  if (ffmpegInstance) return ffmpegInstance;
  if (ffmpegLoading) {
    while (ffmpegLoading) await new Promise(r => setTimeout(r, 100));
    return ffmpegInstance;
  }
  
  ffmpegLoading = true;
  
  try {
    // SharedArrayBuffer Check
    const hasSAB = typeof SharedArrayBuffer !== 'undefined';
    console.log(`📊 SharedArrayBuffer: ${hasSAB ? 'verfügbar (multi-thread)' : 'nicht verfügbar (single-thread)'}`);
    
    // FFmpeg-Library laden
    if (!window.FFmpegWASM && !window.FFmpeg) {
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/@ffmpeg/[email protected]/dist/umd/ffmpeg.js';
        script.crossOrigin = 'anonymous';
        script.onload = resolve;
        script.onerror = () => reject(new Error('FFmpeg-Library konnte nicht geladen werden. Internet prüfen?'));
        document.head.appendChild(script);
      });
    }
    
    if (!window.FFmpegUtil) {
      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/@ffmpeg/[email protected]/dist/umd/index.js';
        script.crossOrigin = 'anonymous';
        script.onload = resolve;
        script.onerror = () => reject(new Error('FFmpeg-Util konnte nicht geladen werden.'));
        document.head.appendChild(script);
      });
    }
    
    const FFmpegClass = (window.FFmpegWASM && window.FFmpegWASM.FFmpeg) || (window.FFmpeg && window.FFmpeg.FFmpeg) || window.FFmpeg;
    const { fetchFile, toBlobURL } = window.FFmpegUtil;
    
    if (!FFmpegClass) {
      throw new Error('FFmpeg-Klasse konnte nicht geladen werden');
    }
    
    const ffmpeg = new FFmpegClass();
    
    // Wähle Core je nach SharedArrayBuffer-Verfügbarkeit
    // hasSAB true → multi-thread (~30s konvertierung)
    // hasSAB false → single-thread (~90s konvertierung, aber FUNKTIONIERT auf lokalen HTML!)
    const coreBaseURL = hasSAB 
      ? 'https://unpkg.com/@ffmpeg/[email protected]/dist/umd'
      : 'https://unpkg.com/@ffmpeg/[email protected]/dist/umd';
    
    const loadConfig = {
      coreURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.wasm`, 'application/wasm'),
    };
    
    // Worker URL nur bei multi-thread
    if (hasSAB) {
      try {
        loadConfig.workerURL = await toBlobURL(`${coreBaseURL}/ffmpeg-core.worker.js`, 'text/javascript');
      } catch(e) {}
    }
    
    await ffmpeg.load(loadConfig);
    
    ffmpegInstance = { ffmpeg, fetchFile, isMultiThread: hasSAB };
    ffmpegLoading = false;
    console.log(`✅ FFmpeg geladen (${hasSAB ? 'multi' : 'single'}-thread)`);
    return ffmpegInstance;
  } catch (err) {
    ffmpegLoading = false;
    console.error('FFmpeg-Load Fehler:', err);
    throw new Error(`FFmpeg konnte nicht geladen werden: ${err.message}. Versuche stattdessen die "Video Converter" App aus dem Play Store.`);
  }
}

// ========== HYBRID MP4-KONVERTER ==========
// Strategie: Erst WebCodecs (modern, schnell), dann FFmpeg single-thread als Fallback

async function convertWebmToMp4UsingWebCodecs(webmBlob, statusCallback) {
  // Prüfe ob WebCodecs verfügbar (Chrome 94+, Android Chrome ja)
  if (typeof VideoEncoder === 'undefined' || typeof VideoDecoder === 'undefined') {
    throw new Error('WebCodecs nicht verfügbar');
  }
  
  if (statusCallback) statusCallback('WebCodecs initialisieren...', 5);
  
  // Video laden
  const videoUrl = URL.createObjectURL(webmBlob);
  const videoEl = document.createElement('video');
  videoEl.src = videoUrl;
  videoEl.muted = true;
  videoEl.playsInline = true;
  
  await new Promise((resolve, reject) => {
    videoEl.onloadedmetadata = resolve;
    videoEl.onerror = () => reject(new Error('Video konnte nicht geladen werden'));
    setTimeout(() => reject(new Error('Video-Load Timeout')), 10000);
  });
  
  const width = videoEl.videoWidth;
  const height = videoEl.videoHeight;
  const duration = videoEl.duration;
  const fps = 30;
  const totalFrames = Math.floor(duration * fps);
  
  if (statusCallback) statusCallback(`Video: ${width}x${height}, ${duration.toFixed(1)}s`, 10);
  
  // Encoder setup (H.264)
  const chunks = [];
  let configData = null;
  
  const encoder = new VideoEncoder({
    output: (chunk, metadata) => {
      if (metadata?.decoderConfig?.description && !configData) {
        configData = metadata.decoderConfig.description;
      }
      const buffer = new Uint8Array(chunk.byteLength);
      chunk.copyTo(buffer);
      chunks.push({
        data: buffer,
        type: chunk.type,
        timestamp: chunk.timestamp,
        duration: chunk.duration || (1000000 / fps)
      });
    },
    error: (e) => { throw e; }
  });
  
  // Konfigurations-Versuche (manche Codecs nicht auf allen Geräten)
  const codecOptions = [
    'avc1.42E01F', // Baseline profile (universal)
    'avc1.4D4028', // Main profile
    'avc1.640028'  // High profile
  ];
  
  let configured = false;
  for (const codec of codecOptions) {
    try {
      const config = {
        codec: codec,
        width: width,
        height: height,
        bitrate: 3500000,
        framerate: fps,
        avc: { format: 'avc' }
      };
      
      const support = await VideoEncoder.isConfigSupported(config);
      if (support.supported) {
        encoder.configure(config);
        configured = true;
        break;
      }
    } catch(e) {}
  }
  
  if (!configured) {
    encoder.close();
    URL.revokeObjectURL(videoUrl);
    throw new Error('Kein passender H.264 Codec verfügbar');
  }
  
  // Canvas für Frame-Extraktion
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  
  // Frames durchgehen
  await videoEl.play();
  videoEl.pause();
  videoEl.currentTime = 0;
  
  let frameCount = 0;
  for (let t = 0; t < duration; t += 1/fps) {
    videoEl.currentTime = t;
    await new Promise(resolve => {
      videoEl.onseeked = resolve;
      setTimeout(resolve, 200);
    });
    
    ctx.drawImage(videoEl, 0, 0, width, height);
    
    const frame = new VideoFrame(canvas, {
      timestamp: t * 1000000,
      duration: 1000000 / fps
    });
    
    encoder.encode(frame, { keyFrame: frameCount % 30 === 0 });
    frame.close();
    
    frameCount++;
    if (frameCount % 10 === 0 && statusCallback) {
      const progress = 10 + Math.floor((frameCount / totalFrames) * 70);
      statusCallback(`Frame ${frameCount}/${totalFrames}`, progress);
    }
  }
  
  if (statusCallback) statusCallback('Audio + Container...', 85);
  
  await encoder.flush();
  encoder.close();
  
  URL.revokeObjectURL(videoUrl);
  
  // ⚠️ Wichtige Limitation: WebCodecs liefert nur Video-Chunks, kein MP4-Container
  // Wir müssen die Chunks in einen MP4-Container packen
  // Das ist komplex - hier nutzen wir trotzdem FFmpeg für den Container-Schritt
  // → daher fällt diese Lösung zurück auf FFmpeg
  
  throw new Error('WebCodecs Container-Building noch nicht implementiert - nutze FFmpeg');
}

async function convertWebmToMp4(webmBlob, statusCallback) {
  // Strategie 1: WebCodecs versuchen (zukünftig)
  // try {
  //   return await convertWebmToMp4UsingWebCodecs(webmBlob, statusCallback);
  // } catch (err) {
  //   console.log('WebCodecs fehlgeschlagen, fallback zu FFmpeg:', err.message);
  // }
  
  // Strategie 2: FFmpeg (single-thread Fallback)
  if (statusCallback) statusCallback('FFmpeg wird geladen...', 10);
  const { ffmpeg, fetchFile } = await loadFFmpeg();
  
  if (statusCallback) statusCallback('Video wird vorbereitet...', 30);
  
  await ffmpeg.writeFile('input.webm', await fetchFile(webmBlob));
  
  if (statusCallback) statusCallback('Wird zu MP4 konvertiert (TikTok-Format)...', 50);
  
  // TIKTOK-OPTIMIERTE FFmpeg-Befehle
  // Wichtig für TikTok-Kompatibilität:
  // -profile:v baseline → universal kompatibel
  // -level 3.0 → unterstützt 720p
  // -pix_fmt yuv420p → universal
  // -r 30 → konstante 30 FPS
  // -c:a aac -ar 44100 → AAC-LC mit 44.1kHz (TikTok-Standard)
  // -vf "scale='if(...)'" → garantiert gerade Dimensionen (H.264 braucht das)
  // -movflags +faststart → metadata am Anfang (TikTok mag das)
  // -shortest → Video stoppt wenn Audio fertig
  await ffmpeg.exec([
    '-i', 'input.webm',
    '-c:v', 'libx264',
    '-profile:v', 'baseline',
    '-level', '3.0',
    '-preset', 'ultrafast',
    '-crf', '23',
    '-pix_fmt', 'yuv420p',
    '-r', '30',
    '-vf', 'scale=trunc(iw/2)*2:trunc(ih/2)*2',
    '-c:a', 'aac',
    '-ar', '44100',
    '-ac', '2',
    '-b:a', '128k',
    '-movflags', '+faststart',
    '-shortest',
    '-y',
    'output.mp4'
  ]);
  
  if (statusCallback) statusCallback('Fast fertig...', 90);
  
  const data = await ffmpeg.readFile('output.mp4');
  const mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
  
  try {
    await ffmpeg.deleteFile('input.webm');
    await ffmpeg.deleteFile('output.mp4');
  } catch(e) {}
  
  if (statusCallback) statusCallback('Fertig!', 100);
  return mp4Blob;
}

async function convertToMp4() {
  if (!state.videoBlob) {
    showError('Kein Video vorhanden');
    return;
  }
  
  // Status-Anzeige SOFORT (kein confirm() - das hängt auf Android)
  const errEl = document.getElementById('error');
  errEl.style.display = 'flex';
  errEl.style.background = 'rgba(139,100,0,0.2)';
  errEl.style.borderColor = '#8b6300';
  errEl.style.color = '#e8c890';
  errEl.innerHTML = '⏳ <strong>FFmpeg wird geladen...</strong><br><span style="font-size: 11px;">Beim ersten Mal: ~30 MB · braucht Internet</span><br><span id="mp4Progress" style="font-size: 11px;">0%</span>';
  
  // Scroll zur Statusanzeige
  errEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  
  try {
    const mp4Blob = await convertWebmToMp4(state.videoBlob, (status, progress) => {
      const span = document.getElementById('mp4Progress');
      if (span) span.textContent = `${progress}% – ${status}`;
    });
    
    // MP4 herunterladen
    const url = URL.createObjectURL(mp4Blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = buildFilename('VIDEO', 'mp4');
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    
    // Erfolgs-Anzeige
    errEl.style.background = 'rgba(0,139,0,0.2)';
    errEl.style.borderColor = '#2a5a2a';
    errEl.style.color = '#90c890';
    errEl.innerHTML = '✓ MP4 wurde heruntergeladen!';
    setTimeout(() => {
      errEl.style.display = 'none';
      errEl.style.background = '';
      errEl.style.borderColor = '';
      errEl.style.color = '';
      errEl.innerHTML = '';
    }, 3000);
  } catch (err) {
    errEl.style.background = 'rgba(139,0,0,0.2)';
    errEl.style.borderColor = '#8b0000';
    errEl.style.color = '#ff9999';
    errEl.innerHTML = `✗ MP4-Konvertierung fehlgeschlagen: ${err.message}<br><br>Alternative: WebM downloaden und auf cloudconvert.com hochladen`;
    setTimeout(() => {
      errEl.style.display = 'none';
      errEl.innerHTML = '';
    }, 8000);
  }
}

// ========== API-KEY TESTER ==========
async function testApiKey(provider, btn) {
  const original = btn.textContent;
  btn.textContent = '⏳ Teste...';
  btn.disabled = true;
  
  try {
    if (provider === 'anthropic') {
      const key = document.getElementById('anthropicKey').value.trim();
      if (!key) throw new Error('Kein Key eingegeben');
      
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 10,
          messages: [{ role: 'user', content: 'Hi' }]
        })
      });
      
      if (response.ok) {
        btn.textContent = '✓ KEY OK';
        btn.style.background = 'rgba(0,139,0,0.3)';
        btn.style.borderColor = '#2a5a2a';
        btn.style.color = '#90c890';
      } else {
        const errText = await response.text();
        throw new Error(`Status ${response.status}: ${errText.substring(0, 60)}`);
      }
    }
    else if (provider === 'elevenlabs') {
      const key = document.getElementById('elevenLabsKey').value.trim();
      if (!key) throw new Error('Kein Key eingegeben');
      
      const response = await fetch('https://api.elevenlabs.io/v1/user', {
        method: 'GET',
        headers: { 'xi-api-key': key }
      });
      
      if (response.ok) {
        const data = await response.json();
        const charsLeft = data.subscription?.character_count !== undefined 
          ? `${data.subscription.character_limit - data.subscription.character_count} Zeichen frei`
          : 'OK';
        btn.textContent = `✓ ${charsLeft}`;
        btn.style.background = 'rgba(0,139,0,0.3)';
        btn.style.borderColor = '#2a5a2a';
        btn.style.color = '#90c890';
      } else {
        throw new Error(`Status ${response.status}`);
      }
    }
    else if (provider === 'pexels') {
      const key = document.getElementById('pexelsKey').value.trim();
      if (!key) throw new Error('Kein Key eingegeben');
      
      // Pexels: nutze Photos-Search statt Videos (zuverlässiger für Key-Test)
      const response = await fetch('https://api.pexels.com/v1/search?query=test&per_page=1', {
        method: 'GET',
        headers: { 
          'Authorization': key
        }
      });
      
      if (response.ok) {
        // Quota-Info auslesen falls vorhanden
        const remaining = response.headers.get('X-Ratelimit-Remaining');
        const limit = response.headers.get('X-Ratelimit-Limit');
        const quotaText = (remaining && limit) 
          ? `${remaining}/${limit} frei`
          : 'OK';
        btn.textContent = `✓ ${quotaText}`;
        btn.style.background = 'rgba(0,139,0,0.3)';
        btn.style.borderColor = '#2a5a2a';
        btn.style.color = '#90c890';
      } else if (response.status === 401) {
        throw new Error('Key ungültig');
      } else {
        throw new Error(`Status ${response.status}`);
      }
    }
  } catch (err) {
    btn.textContent = `✗ ${err.message.substring(0, 30)}`;
    btn.style.background = 'rgba(139,0,0,0.3)';
    btn.style.borderColor = '#8b0000';
    btn.style.color = '#ff9999';
  }
  
  btn.disabled = false;
  setTimeout(() => {
    btn.textContent = original;
    btn.style.background = '';
    btn.style.borderColor = '';
    btn.style.color = '';
  }, 5000);
}

// ========== BIBLIOTHEK BACKUP ==========
function exportLibrary() {
  if (state.library.length === 0) {
    showError('Bibliothek ist leer – nichts zum Exportieren');
    return;
  }
  
  const data = {
    version: 1,
    exportDate: new Date().toISOString(),
    appName: 'Horror Forge',
    storyCount: state.library.length,
    stories: state.library
  };
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `horror_forge_backup_${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importLibrary(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      
      if (!data.stories || !Array.isArray(data.stories)) {
        throw new Error('Ungültiges Datei-Format');
      }
      
      const choice = confirm(
        `Import von ${data.stories.length} Stories aus ${data.exportDate ? new Date(data.exportDate).toLocaleDateString('de-DE') : 'Backup'}.\n\n` +
        'OK = ZUSAMMENFÜGEN mit aktuellen Stories\n' +
        'Abbrechen = abbrechen'
      );
      
      if (choice) {
        // Zusammenfügen ohne Duplikate (nach ID)
        const existingIds = new Set(state.library.map(s => s.id));
        const newStories = data.stories.filter(s => !existingIds.has(s.id));
        state.library = [...state.library, ...newStories].slice(0, 200);
        Storage.set('library', JSON.stringify(state.library));
        
        const el = document.getElementById('error');
        el.textContent = `✓ ${newStories.length} neue Stories importiert!`;
        el.style.background = 'rgba(0,139,0,0.2)';
        el.style.borderColor = '#2a5a2a';
        el.style.color = '#90c890';
        el.style.display = 'flex';
        setTimeout(() => {
          el.style.display = 'none';
          el.style.background = '';
          el.style.borderColor = '';
          el.style.color = '';
        }, 3000);
        
        render();
      }
    } catch (err) {
      showError(`Import fehlgeschlagen: ${err.message}`);
    }
    
    // Reset file input
    event.target.value = '';
  };
  
  reader.readAsText(file);
}
