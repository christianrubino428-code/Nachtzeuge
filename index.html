// ========== STORAGE (robust) ==========
const Storage = {
  set(key, value) {
    const size = value ? value.length : 0;
    
    // Versuche localStorage (zuverlässigster auf Android)
    try { 
      localStorage.setItem(key, value); 
      return true;
    } catch(e) {
      console.warn(`localStorage voll/blockiert für ${key} (${size} chars):`, e.message);
    }
    
    // Fallback: sessionStorage (verliert sich beim Schließen)
    try { 
      sessionStorage.setItem(key, value); 
    } catch(e) {}
    
    // Cookie NUR für kleine Daten (max 3 KB), nicht für library!
    if (size < 3000 && key !== 'library') {
      try {
        const expires = new Date();
        expires.setFullYear(expires.getFullYear() + 1);
        document.cookie = `${key}=${encodeURIComponent(value)};expires=${expires.toUTCString()};path=/;SameSite=Lax`;
      } catch(e) {}
    }
    return false;
  },
  get(key) {
    try { const v = localStorage.getItem(key); if (v !== null) return v; } catch(e) {}
    try { const v = sessionStorage.getItem(key); if (v !== null) return v; } catch(e) {}
    // Cookie-Fallback nur für nicht-library
    if (key !== 'library') {
      try {
        const match = document.cookie.match(new RegExp('(^| )' + key + '=([^;]+)'));
        if (match) return decodeURIComponent(match[2]);
      } catch(e) {}
    }
    return null;
  },
  // Library hat eigene Quota-Behandlung
  setLibrary(library) {
    try {
      const json = JSON.stringify(library);
      localStorage.setItem('library', json);
      console.log(`📚 Library gespeichert: ${library.length} Einträge (${Math.round(json.length/1024)} KB)`);
      return true;
    } catch(e) {
      console.error('❌ Library zu groß für localStorage!', e.message);
      // Notfall: älteste Einträge löschen bis es passt
      while (library.length > 10) {
        library.pop(); // entfernt ältesten
        try {
          localStorage.setItem('library', JSON.stringify(library));
          console.warn(`⚠️ Library gekürzt auf ${library.length} Einträge`);
          return true;
        } catch(e2) {}
      }
      return false;
    }
  }
};

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Sichere Copy-Funktion für aktuell generierte Story (Done-Screen)

function copyFromLibrary(entryId, field, btn) {

      break;

             (entry.story.scenes || []).map(s => 
               (s.narration || '').replace(/\[STIMME2\]|\[\/STIMME2\]/g, '')
             ).join('\n\n');
      break;
  }
  
  if (text) {
    copyToClipboard(text, btn);
  }
}

function copyToClipboard(text, btn) {
  function showSuccess() {
    if (btn) {
      const original = btn.textContent;
      btn.textContent = '✓ KOPIERT';
      btn.style.background = 'rgba(0, 139, 0, 0.3)';
      btn.style.borderColor = '#2a5a2a';
      setTimeout(() => {
        btn.textContent = original;
        btn.style.background = '';
        btn.style.borderColor = '';
      }, 2000);
    }
  }
  
  // Sichtbarer Text-Dialog mit Auto-Selection (funktioniert IMMER, auch bei content:// URLs)
  function showCopyDialog() {
    // Bestehenden Dialog entfernen falls vorhanden
    const existing = document.getElementById('copyDialog');
    if (existing) existing.remove();
    
    const overlay = document.createElement('div');
    overlay.id = 'copyDialog';
    overlay.style.cssText = `
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      padding: 20px;
      font-family: 'Courier New', monospace;
    `;
    
    overlay.innerHTML = `
      <div style="color: #e8d8c8; font-size: 14px; font-weight: bold; margin-bottom: 12px; text-align: center;">
        📋 TEXT ZUM KOPIEREN
      </div>
      <div style="color: #8b6f5a; font-size: 11px; margin-bottom: 12px; text-align: center; line-height: 1.5;">
        Drück lange auf den Text → "Alles auswählen" → "Kopieren"
      </div>
      <textarea readonly style="
        flex: 1;
        width: 100%;
        background: rgba(40,20,20,0.9);
        border: 2px solid #8b0000;
        color: #e8d8c8;
        padding: 14px;
        font-size: 14px;
        font-family: 'Courier New', monospace;
        line-height: 1.5;
        resize: none;
        -webkit-user-select: text;
        user-select: text;
      ">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
      <button id="copyDialogClose" style="
        margin-top: 14px;
        padding: 14px;
        background: linear-gradient(135deg, #8b0000, #4a0000);
        color: #e8d8c8;
        border: 1px solid #ff6666;
        font-size: 14px;
        font-weight: bold;
        font-family: inherit;
        letter-spacing: 2px;
        cursor: pointer;
      ">✗ SCHLIESSEN</button>
    `;
    
    document.body.appendChild(overlay);
    
    const closeBtn = document.getElementById('copyDialogClose');
    closeBtn.addEventListener('click', () => overlay.remove());
    
    // Text automatisch markieren
    const ta = overlay.querySelector('textarea');
    setTimeout(() => {
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, text.length);
    }, 100);
    
    if (btn) {
      btn.textContent = '📋 ZEIGE TEXT';
      setTimeout(() => { btn.textContent = 'KOPIE'; }, 2000);
    }
  }
  
  // METHODE 1: execCommand mit textarea (bester Versuch für lokale Files)
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    ta.style.top = '0';
    ta.setAttribute('readonly', '');
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, text.length);
    
    const success = document.execCommand('copy');
    document.body.removeChild(ta);
    
    if (success) {
      showSuccess();
      return;
    }
  } catch (err) {}
  
  // METHODE 2: Modern Clipboard API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showSuccess())
      .catch(() => showCopyDialog());
    return;
  }
  
  // METHODE 3: Sichtbarer Dialog – funktioniert IMMER
  showCopyDialog();
}

// ========== API CALLS ==========
async function callClaude(prompt) {
  if (!state.anthropicKey) throw new Error('Anthropic API-Key fehlt');
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': state.anthropicKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5-20250929',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!response.ok) {
    const err = await response.text();
    throw new Error(`Claude API: ${response.status} - ${err.substring(0, 100)}`);
  }
  const data = await response.json();
  return data.content.map(i => i.text || '').join('\n');
}

async function searchPexelsVideo(query) {
  if (!state.pexelsKey) return null;
  try {
    const response = await fetch(
      `https://api.pexels.com/videos/search?query=${encodeURIComponent(query)}&orientation=portrait&size=medium&per_page=10`,
      { headers: { 'Authorization': state.pexelsKey } }
    );
    if (!response.ok) return null;
    const data = await response.json();
    if (!data.videos || data.videos.length === 0) return null;
    
    for (const video of data.videos) {
      const portraitFile = video.video_files.find(f => 
        f.width < f.height && f.quality !== 'hls' && f.width >= 540
      );
      if (portraitFile) return { url: portraitFile.link, duration: video.duration };
    }
    
    const anyFile = data.videos[0].video_files.find(f => f.quality !== 'hls');
    if (anyFile) return { url: anyFile.link, duration: data.videos[0].duration };
    
    return null;
  } catch (err) {
    return null;
  }
}

// ========== MAIN PIPELINE ==========
// ========== WAKE LOCK + SOUND ALARM ==========
let wakeLockObj = null;

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLockObj = await navigator.wakeLock.request('screen');
      console.log('🔒 Wake Lock aktiv - Bildschirm bleibt an');
      
      // Re-acquire wenn Tab wieder sichtbar wird
      document.addEventListener('visibilitychange', async () => {
        if (wakeLockObj !== null && document.visibilityState === 'visible' && state.running) {
          try {
            wakeLockObj = await navigator.wakeLock.request('screen');
          } catch(e) {}
        }
      });
    }
  } catch (err) {
    console.log('Wake Lock nicht verfügbar:', err.message);
  }
}

async function releaseWakeLock() {
  if (wakeLockObj) {
    try {
      await wakeLockObj.release();
      wakeLockObj = null;
      console.log('🔓 Wake Lock freigegeben');
    } catch(e) {}
  }
}

// Sound + Vibration wenn Video fertig
function playDoneAlarm() {
  // Vibration (Android)
  if ('vibrate' in navigator) {
    try {
      navigator.vibrate([300, 100, 300, 100, 500]);
    } catch(e) {}
  }
  
  // Sound: Synth-Glocke (3x)
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBell(time, freq) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + time);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + time + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + time + 0.8);
      osc.start(ctx.currentTime + time);
      osc.stop(ctx.currentTime + time + 0.8);
    }
    
    playBell(0, 880);     // A5
    playBell(0.3, 1108);  // C#6
    playBell(0.6, 1318);  // E6
    
    // AudioContext nach 2 Sekunden schließen
    setTimeout(() => ctx.close(), 2000);
  } catch (err) {

  }
  
  // Page-Title flashen (zeigt Notification im Tab)
  let flashCount = 0;

  const flashInterval = setInterval(() => {
    document.title = flashCount % 2 === 0 ? '✅ FERTIG! - Horror Forge' : '🐦‍⬛ Horror Forge';
    flashCount++;
    if (flashCount > 10) {
      clearInterval(flashInterval);
      document.title = originalTitle;
    }
  }, 600);
  
  // Visual-Flash auf der Seite (Browser-Notification falls erlaubt)
  if ('Notification' in window && Notification.permission === 'granted') {

        tag: 'horror-forge-done'
      });
    } catch(e) {}
  }
}

// Generiert 3 verschiedene Hook-Vorschläge - User wählt den besten
async function generateHookCandidates() {
  const genreObj = horrorGenres.find(g => g.id === state.genre);
  const themeText = state.theme ? `Thema: ${state.theme}` : '';
  
  const prompt = `Du bist Profi für virale TikTok-Hooks im Horror-Genre.

Erstelle 3 verschiedene KURZE, KNALLHARTE Hook-Sätze für eine ${genreObj.label} Story.
${themeText}

⚡ HOOK-REGELN:
- GENAU 4-7 Wörter pro Hook (NIE mehr als 8!)
- In GROSSBUCHSTABEN denken (wirkt wie Schlagzeile)
- Erzeugt sofort: "WAS?? Erzähl mir mehr!"
- Schock, Mystery, Unmöglichkeit

⚡ NUTZE 3 VERSCHIEDENE STILE:

STIL 1 - ZEITLICH/PRÄZISE:
"UM 3:14 KAM ER ZURÜCK."
"FREITAG, 23 UHR. WIE IMMER."
"NACH 23 JAHREN STILLE."

STIL 2 - ENTHÜLLUNG/SCHOCK:
"DAS GRAB WAR LEER."
"ER WAR SEIT JAHREN TOT."
"ES WAR NICHT MEIN BRUDER."

STIL 3 - DIREKTE HANDLUNG:
"SIE STAND VOR MEINEM BETT."
"ICH HÖRTE IHN ATMEN."
"DIE TÜR WAR INNEN VERRIEGELT."

Gib NUR ein JSON-Array zurück mit GENAU 3 Hook-Strings, sonst nichts:

["HOOK 1", "HOOK 2", "HOOK 3"]

Verschiedene Stile, alle kurz und brutal!`;

  try {
    const response = await callClaude(prompt);
    // Extrahiere JSON-Array
    let jsonText = response.trim();
    // Entferne Markdown-Code-Blocks falls vorhanden
    jsonText = jsonText.replace(/```json\s*/g, '').replace(/```\s*/g, '');
    // Finde das Array
    const arrayMatch = jsonText.match(/\[[\s\S]*?\]/);
    if (arrayMatch) jsonText = arrayMatch[0];
    
    const hooks = JSON.parse(jsonText);
    if (!Array.isArray(hooks) || hooks.length < 3) {
      throw new Error('Nicht genug Hooks generiert');
    }
    
    state.hookCandidates = hooks.slice(0, 3).map(h => 
      typeof h === 'string' ? h.trim().toUpperCase().replace(/[\.\!]+$/, '.') : 'HOOK'
    );
    
    console.log('🪝 3 Hook-Kandidaten:', state.hookCandidates);
  } catch (err) {
    console.error('Hook-Generation fehlgeschlagen:', err);
    // Fallback: simple Hooks
    state.hookCandidates = [
      'ER KAM JEDE NACHT.',
      'DAS GRAB WAR LEER.',
      'SIE STAND VOR MEINEM BETT.'
    ];
  }
}

async function selectHookAndContinue(hookIndex) {
  if (hookIndex < 0 || hookIndex >= state.hookCandidates.length) return;
  
  state.selectedHookIndex = hookIndex;
  state.awaitingHookSelection = false;
  state.running = true;
  state.step = 'running';
  render();
  
  await requestWakeLock();
  
  try {
    // Story mit dem ausgewählten Hook generieren
    setStatus('📖 Story wird um den Hook geschrieben...', 8);
    await generateStoryWithSelectedHook();
    
    setStatus('🔊 KI-Stimme wird erzeugt...', 20);

    setStatus('🎬 Videos/Bilder werden geladen...', 35);
    await generateMedia();
    
    if (state.useMusic) {
      setStatus('🎵 Hintergrund-Musik wird geladen...', 65);
      await loadBackgroundMusic();
    }
    
    setStatus('🎯 Cover wird erstellt...', 72);

      state.videoBlob = mp4Blob;

async function generateStoryWithSelectedHook() {
  // Spezial-Version von generateStory: Hook ist vorgegeben
  const chosenHook = state.hookCandidates[state.selectedHookIndex];

  state._predefinedHook = chosenHook;
  await generateStory();
  // Stelle sicher dass der gewählte Hook auch im Result steht
  if (state.story) state.story.hook = chosenHook;
  state._predefinedHook = null;
}

async function generateStory() {
  const length = parseInt(state.length);
  // SCHNITTFREQUENZ-OPTIMIERUNG für TikTok:
  // Studien zeigen: 1,5-2 Sek pro Szene = beste Watchtime
  // Vorher: 4,3 Sek/Szene (zu langsam) → jetzt: ~2 Sek/Szene
  const sceneCount = length <= 15 ? 8 : length <= 30 ? 14 : 22;
  // Strenge Wort-Limits für genaue Längen-Einhaltung
  // Deutsche ElevenLabs-Stimme spricht ~2,3 Wörter/Sekunde
  const wordsTarget = length <= 15 ? 32 : length <= 30 ? 68 : 138;
  const wordsMax = length <= 15 ? 38 : length <= 30 ? 78 : 155;
  const wordsMin = length <= 15 ? 26 : length <= 30 ? 58 : 120;
  const themeText = state.theme ? `THEMA/SETTING: ${state.theme}` : '';
  
  // Wenn Teil 2+: vorherige Story als Kontext mitgeben
  let parentContext = '';
  let currentPartNumber = 1;
  let nextPartNumber = 2;
  let isContinuation = false;
  let allPreviousParts = [];
  
  if (state.parentStoryId) {
    isContinuation = true;
    const parent = state.library.find(e => e.id === state.parentStoryId);
    if (parent) {
      currentPartNumber = (parent.part || 1) + 1;
      nextPartNumber = currentPartNumber + 1;
      
      // Alle vorherigen Teile sammeln (von Teil 1 bis aktueller-1)
      allPreviousParts = [parent];
      let currentParent = parent;
      while (currentParent.parentId) {
        const p = state.library.find(e => e.id === currentParent.parentId);
        if (!p) break;
        allPreviousParts.unshift(p);
        currentParent = p;
      }
      
      const previousStoryText = allPreviousParts.map((p, idx) => 
        `TEIL ${p.part || (idx + 1)}: ${p.story.hook} ${p.story.scenes.map(s => s.narration.replace(/\[STIMME2\]|\[\/STIMME2\]/g, '')).join(' ')}`
      ).join('\n\n');
      
      parentContext = `

═══════════════════════════════════
🔄 DIES IST TEIL ${currentPartNumber} EINER SERIE
═══════════════════════════════════
BISHERIGE TEILE:

${previousStoryText}

WICHTIG für TEIL ${currentPartNumber}:
- Setze die Geschichte LOGISCH fort
- Greife konkrete Details aus den vorherigen Teilen auf
- Beantworte den Cliffhanger des letzten Teils
- KEINE Wiederholung des bisher Erzählten (Zuschauer kennt es)
- Eigener Spannungsbogen mit eigenem Höhepunkt
`;
    }
  }
  
  // Cliffhanger-Text dynamisch je nach Teil
  let endingText = '';
  if (state.series) {
    if (isContinuation) {
      endingText = `Story endet mit Cliffhanger. Letzte Zeile: "Teil ${nextPartNumber} morgen." (NICHT "Teil 2 morgen"!)`;
    } else {
      endingText = `Story endet mit Cliffhanger. Letzte Zeile: "Teil 2 morgen."`;
    }
  } else if (isContinuation) {
    endingText = `Dies ist das ENDE der Serie (kein Cliffhanger). Letzte Zeile soll wirken wie ein finaler Schluss/Twist – KEINE "Teil X morgen"-Phrase.`;
  }
  
  const genreObj = horrorGenres.find(g => g.id === state.genre);
  const genreLabel = genreObj.label;
  const genreDesc = genreObj.desc || '';
  
  // TWIST-VIELFALT: Verhindert dass alle Stories gleich enden
  // Random-Auswahl eines Twist-Typs - die KI muss diesen nutzen
  const twistTypes = [
    'OFFENBARUNG: Was harmlos schien, war die ganze Zeit der wahre Horror (z.B. "Die Stimme war meine eigene")',
    'INVERSION: Die Realität war umgekehrt (z.B. "Ich war nicht der Gefangene - sondern der Wärter")',
    'GENERATIONS-ECHO: Etwas wiederholt sich aus der Vergangenheit (z.B. "Mein Großvater hatte vor 50 Jahren denselben Brief geschrieben")',
    'IDENTITÄTS-SCHOCK: Eine Person ist nicht die, die sie zu sein schien (z.B. "Meine Mutter war seit 3 Jahren tot")',
    'ORT-ENTHÜLLUNG: Der Ort ist anders als gedacht (z.B. "Ich war nie wirklich zu Hause gewesen")',
    'ZEITSCHLEIFE: Etwas passiert wieder und wieder (z.B. "Es war die 23. Nacht in Folge")',
    'BEOBACHTER-WECHSEL: Plötzlich wird der Erzähler selbst zum Horror (z.B. "Sie haben recht, ich existiere nicht mehr")',
    'KOLLEKTIV-WAHRHEIT: Viele andere wussten es bereits (z.B. "Alle in unserem Dorf hatten dieselbe Geschichte")',
    'GEGENSTÄNDLICHE EVIDENZ: Ein physisches Detail entlarvt alles (z.B. "Auf dem Foto fehlte mein Schatten")',
    'WAHRNEHMUNGS-BRUCH: Sinne haben gelogen (z.B. "Mein Bruder war seit 10 Jahren tot - aber ich hatte ihn jeden Tag gesehen")'
  ];
  const selectedTwist = twistTypes[Math.floor(Math.random() * twistTypes.length)];
  
  let prompt = `Du bist Profi-Drehbuchautor für virale TikTok-Horror-Videos auf Deutsch (Stil: MrBallen, deutsche Reddit-Geschichten-Channels).

GENRE: ${genreLabel} (${genreDesc})

🚨 KRITISCH WICHTIG – LÄNGE 🚨
GENAU ${length} Sekunden Video!
- Hook + alle Szenen ZUSAMMEN: ZWISCHEN ${wordsMin} und ${wordsMax} Wörter
- Ziel: ${wordsTarget} Wörter
- ❌ MEHR als ${wordsMax} Wörter = Video wird zu LANG
- ❌ WENIGER als ${wordsMin} Wörter = Video wird zu KURZ
- Sprechgeschwindigkeit: 2,3 Wörter/Sek im Deutschen
- ZÄHLE deine Wörter bevor du JSON schickst!
- Lieber kurz und knackig, NIE überschreiten!

LÄNGE: ${length} Sekunden (= ca. ${wordsTarget} Wörter, ${sceneCount} Szenen)
${themeText}
${endingText}
${parentContext}

🎯 TWIST-TYP FÜR DIESE STORY:
${selectedTwist}
→ Baue die finale Auflösung um genau diesen Twist herum.

${state._predefinedHook ? `🪝 VORGEGEBENER HOOK (vom User gewählt - MUSS verwendet werden!):
"${state._predefinedHook}"
→ Nutze GENAU diesen Hook als ersten Satz. Schreibe NICHT deinen eigenen!

// Fixt automatische Wiederholungen falls die KI sich nicht dran hält
function countWords(text) {
  if (!text) return 0;
  return text.trim().split(/\s+/).filter(w => w.length > 0).length;
}

function countStoryWords(story) {
  if (!story) return 0;
  let total = countWords(story.hook);
  if (story.scenes) {
    story.scenes.forEach(s => {
      const cleanText = (s.narration || '').replace(/\[STIMME2\]|\[\/STIMME2\]/g, '');
      total += countWords(cleanText);
    });
  }
  return total;
}

function trimStoryToWordLimit(story, maxWords) {
  if (!story || !story.scenes) return;
  
  const hookWords = countWords(story.hook);
  let totalWords = hookWords;
  let keepScenes = [];
  
  for (let i = 0; i < story.scenes.length; i++) {
    const scene = story.scenes[i];
    const cleanText = (scene.narration || '').replace(/\[STIMME2\]|\[\/STIMME2\]/g, '');
    const sceneWords = countWords(cleanText);
    
    if (totalWords + sceneWords <= maxWords) {
      // Szene passt komplett rein
      keepScenes.push(scene);
      totalWords += sceneWords;
    } else {
      // Szene wäre zu viel - prüfen ob wir sie kürzen können
      const remaining = maxWords - totalWords;
      
      if (remaining >= 5) {
        // Genug Platz für eine gekürzte Version
        const sentences = cleanText.split(/(?<=[.!?])\s+/);
        let trimmedText = '';
        let trimmedWords = 0;
        
        for (const sentence of sentences) {
          const sentWords = countWords(sentence);
          if (trimmedWords + sentWords > remaining) break;
          trimmedText += (trimmedText ? ' ' : '') + sentence;
          trimmedWords += sentWords;
        }
        
        if (trimmedText.length > 5) {
          keepScenes.push({
            ...scene,
            narration: trimmedText
          });
        }
      }
      
      // Restliche Szenen verwerfen
      break;
    }
  }
  
  // Falls Cliffhanger in Original-Story am Ende war: an letzte Szene anhängen
  const originalLast = story.scenes[story.scenes.length - 1];
  if (originalLast && /Teil \d+\s*morgen\.?/i.test(originalLast.narration)) {
    if (keepScenes.length > 0) {
      const lastKept = keepScenes[keepScenes.length - 1];
      if (!/Teil \d+\s*morgen\.?/i.test(lastKept.narration)) {
        const cliffMatch = originalLast.narration.match(/Teil \d+\s*morgen\.?/i);
        if (cliffMatch) {
          lastKept.narration = lastKept.narration.trim() + ' ' + cliffMatch[0];
        }
      }
    }
  }
  
  if (keepScenes.length > 0 && keepScenes.length < story.scenes.length) {
    console.log(`✂️ Story gekürzt: ${story.scenes.length} → ${keepScenes.length} Szenen`);
    story.scenes = keepScenes;
  }
}

function fixDuplicates(story) {
  if (!story || !story.scenes || story.scenes.length === 0) return;
  
  const hookText = story.hook.trim().toLowerCase();
  const firstScene = story.scenes[0].narration.trim();
  const firstSceneLower = firstScene.toLowerCase();
  
  // Fall 1: Erste Szene beginnt EXAKT mit dem Hook
  if (firstSceneLower.startsWith(hookText)) {
    const remainder = firstScene.substring(story.hook.length).trim();
    // Punkt am Anfang entfernen
    const cleaned = remainder.replace(/^[\.,;\s]+/, '').trim();
    if (cleaned.length > 5) {
      story.scenes[0].narration = cleaned;
    }
  }
  
  // Fall 2: Hook ist Teil-Substring der ersten Szene (z.B. Hook leicht abgewandelt)
  // Prüfe ersten Satz der scene[0]
  const firstSentence = firstScene.split(/[.!?]/)[0].trim().toLowerCase();
  if (firstSentence.length > 10 && hookText.includes(firstSentence)) {
    // Ersten Satz aus Szene entfernen
    const sentences = firstScene.split(/(?<=[.!?])\s+/);
    if (sentences.length > 1) {
      story.scenes[0].narration = sentences.slice(1).join(' ').trim();
    }
  }
  
  // Fall 3: Letzte Szene wiederholt den Cliffhanger doppelt
  const lastScene = story.scenes[story.scenes.length - 1];
  if (lastScene && lastScene.narration) {
    // Suche nach doppelten "Teil X morgen"
    const teilMatches = lastScene.narration.match(/Teil \d+\s*morgen\.?/gi);
    if (teilMatches && teilMatches.length > 1) {
      // Behalte nur das letzte Vorkommen
      const lastMatch = teilMatches[teilMatches.length - 1];
      const cleanedNarration = lastScene.narration.replace(/Teil \d+\s*morgen\.?/gi, '').trim();
      lastScene.narration = (cleanedNarration + ' ' + lastMatch).trim().replace(/\s+/g, ' ');
    }
  }
  
  // Fall 4: scenes[0] ist fast leer nach dem Hook-Cleanup
  if (story.scenes[0].narration.length < 10) {
    // Verschmelze mit Szene 1 falls vorhanden
    if (story.scenes.length > 1) {
      story.scenes[0].narration = (story.scenes[0].narration + ' ' + story.scenes[1].narration).trim();
      story.scenes.splice(1, 1);
    }
  }
}

async function generateAudio() {
  const fullText = state.story.hook + ' ' + state.story.scenes.map(s => s.narration).join(' ');
  
  // Prüfe ob Multi-Voice-Marker vorhanden und Modus aktiv
  const hasMultiVoice = false; // Multi-Voice deaktiviert
  
  if (hasMultiVoice) {
    await generateMultiVoiceAudio(fullText);
  } else {
    // Standard: ein Stück Audio
    // Marker entfernen falls vorhanden aber Multi-Voice aus
    const cleanText = fullText.replace(/\[STIMME2\]|\[\/STIMME2\]/g, '');
    await generateSingleVoiceAudio(cleanText);
  }
}

async function generateSingleVoiceAudio(narration) {
  // Versuche mit timestamps API
  try {
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${state.voiceId}/with-timestamps`, {
      method: 'POST',
      headers: {
        'xi-api-key': state.elevenLabsKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        text: narration,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.6, similarity_boost: 0.75, style: 0.4, use_speaker_boost: true }
      })
    });
    
    if (response.ok) {
      const data = await response.json();
      const audioData = atob(data.audio_base64);
      const bytes = new Uint8Array(audioData.length);
      for (let i = 0; i < audioData.length; i++) bytes[i] = audioData.charCodeAt(i);
      state.audioBlob = new Blob([bytes], { type: 'audio/mpeg' });
      
      if (data.alignment && data.alignment.characters) {
        state.wordTimings = parseWordTimings(narration, data.alignment);
      }
    } else {
      throw new Error('Timestamps API failed');
    }
  } catch (e) {
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${state.voiceId}`, {
      method: 'POST',
      headers: {
        'xi-api-key': state.elevenLabsKey,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify({
        text: narration,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.6, similarity_boost: 0.75, style: 0.4, use_speaker_boost: true }
      })
    });
    
    if (!response.ok) throw new Error(`Audio fehlgeschlagen: ${response.status}`);
    state.audioBlob = await response.blob();
  }
  
  await calculateAudioDuration();
}

async function generateMultiVoiceAudio(fullText) {
  // Text in Segmente splitten basierend auf [STIMME2]-Markern
  // Beispiel: "Hallo [STIMME2]Wie geht's?[/STIMME2] sagte er." 
  // → [{voice:1, text:"Hallo "}, {voice:2, text:"Wie geht's?"}, {voice:1, text:" sagte er."}]
  
  const segments = parseMultiVoiceSegments(fullText);
  setStatus(`🔊 ${segments.length} Audio-Segmente werden erzeugt...`, 22);
  
  // Audio-Segmente parallel generieren
  const audioBlobs = [];
  for (let i = 0; i < segments.length; i++) {
    const seg = segments[i];
    const voice = state.voiceId; // Multi-Voice deaktiviert
    
    setStatus(`🔊 Stimme ${seg.voice} (${i + 1}/${segments.length})...`, 22 + ((i / segments.length) * 8));
    
    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voice}`, {
      method: 'POST',
      headers: {
        'xi-api-key': state.elevenLabsKey,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify({
        text: seg.text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { 
          stability: seg.voice === 2 ? 0.5 : 0.6, 
          similarity_boost: 0.75, 
          style: seg.voice === 2 ? 0.55 : 0.4, 
          use_speaker_boost: true 
        }
      })
    });
    
    if (!response.ok) throw new Error(`Multi-Voice fehlgeschlagen: ${response.status}`);
    audioBlobs.push(await response.blob());
  }
  
  // Audio-Segmente zusammenfügen mit AudioContext
  const audioContext = new AudioContext();
  const audioBuffers = [];
  for (const blob of audioBlobs) {
    const arrayBuffer = await blob.arrayBuffer();
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
    audioBuffers.push(audioBuffer);
  }
  
  // Gesamtlänge berechnen + kurze Pause zwischen Stimmenwechseln
  const pauseDuration = 0.15; // 150ms Pause zwischen Stimmen
  let totalLength = 0;
  for (let i = 0; i < audioBuffers.length; i++) {
    totalLength += audioBuffers[i].length;
    if (i < audioBuffers.length - 1) {
      totalLength += Math.floor(audioContext.sampleRate * pauseDuration);
    }
  }
  
  // Gemeinsamen Buffer erstellen
  const combinedBuffer = audioContext.createBuffer(
    1, // mono reicht
    totalLength,
    audioContext.sampleRate
  );
  const channelData = combinedBuffer.getChannelData(0);
  
  let offset = 0;
  for (let i = 0; i < audioBuffers.length; i++) {
    const buffer = audioBuffers[i];
    const sourceData = buffer.getChannelData(0);
    for (let j = 0; j < sourceData.length; j++) {
      channelData[offset + j] = sourceData[j];
    }
    offset += sourceData.length;
    if (i < audioBuffers.length - 1) {
      offset += Math.floor(audioContext.sampleRate * pauseDuration);
    }
  }
  
  // Buffer zu WAV → Blob konvertieren
  state.audioBlob = bufferToWavBlob(combinedBuffer);
  state.audioDuration = combinedBuffer.duration;
  
  // Wort-Timings linear schätzen (Multi-Voice hat keine Timestamps)
  const cleanText = fullText.replace(/\[STIMME2\]|\[\/STIMME2\]/g, '');
  state.wordTimings = estimateWordTimings(cleanText, state.audioDuration);
}

function parseMultiVoiceSegments(text) {
  const segments = [];
  let remaining = text;
  let currentVoice = 1;
  
  while (remaining.length > 0) {
    if (currentVoice === 1) {
      const startIdx = remaining.indexOf('[STIMME2]');
      if (startIdx === -1) {
        segments.push({ voice: 1, text: remaining.trim() });
        break;
      }
      if (startIdx > 0) {
        segments.push({ voice: 1, text: remaining.substring(0, startIdx).trim() });
      }
      remaining = remaining.substring(startIdx + 9); // skip [STIMME2]
      currentVoice = 2;
    } else {
      const endIdx = remaining.indexOf('[/STIMME2]');
      if (endIdx === -1) {
        segments.push({ voice: 2, text: remaining.trim() });
        break;
      }
      segments.push({ voice: 2, text: remaining.substring(0, endIdx).trim() });
      remaining = remaining.substring(endIdx + 10); // skip [/STIMME2]
      currentVoice = 1;
    }
  }
  
  return segments.filter(s => s.text.length > 0);
}

function bufferToWavBlob(audioBuffer) {
  const numChannels = 1;
  const sampleRate = audioBuffer.sampleRate;
  const length = audioBuffer.length * numChannels * 2 + 44;
  const buffer = new ArrayBuffer(length);
  const view = new DataView(buffer);
  const channelData = audioBuffer.getChannelData(0);
  
  // WAV-Header
  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }
  
  writeString(0, 'RIFF');
  view.setUint32(4, length - 8, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true); // PCM chunk size
  view.setUint16(20, 1, true); // PCM format
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * 2, true); // byte rate
  view.setUint16(32, numChannels * 2, true); // block align
  view.setUint16(34, 16, true); // bits per sample
  writeString(36, 'data');
  view.setUint32(40, audioBuffer.length * numChannels * 2, true);
  
  // PCM-Daten
  let offset = 44;
  for (let i = 0; i < channelData.length; i++) {
    const sample = Math.max(-1, Math.min(1, channelData[i]));
    view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
    offset += 2;
  }
  
  return new Blob([buffer], { type: 'audio/wav' });
}

async function calculateAudioDuration() {
  // METHODE 1: AudioContext.decodeAudioData (zuverlässigste Methode auf Android)
  // Liest die echte Audio-Dauer aus den dekodierten Daten
  try {
    const arrayBuffer = await state.audioBlob.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
    state.audioDuration = audioBuffer.duration;
    audioCtx.close();
    console.log(`✅ Audio-Duration (via decodeAudioData): ${state.audioDuration.toFixed(2)}s`);
  } catch (decodeErr) {
    console.log('⚠️ decodeAudioData fehlgeschlagen, nutze Fallback:', decodeErr.message);
    
    // METHODE 2: Audio-Element mit Workaround
    const tempUrl = URL.createObjectURL(state.audioBlob);
    const audio = new Audio(tempUrl);
    audio.preload = 'metadata';
    
    await new Promise((resolve, reject) => {
      audio.onloadedmetadata = resolve;
      audio.onerror = reject;
      setTimeout(reject, 5000);
    });
    
    let duration = audio.duration;
    
    if (!isFinite(duration) || duration === 0 || duration > 600) {
      audio.currentTime = 1e101;
      await new Promise(resolve => {
        audio.ontimeupdate = () => {
          if (isFinite(audio.duration) && audio.duration > 0) {
            duration = audio.duration;
            audio.ontimeupdate = null;
            resolve();
          }
        };
        setTimeout(resolve, 3000);
      });
    }
    
    if (!isFinite(duration) || duration === 0) {
      // METHODE 3: Schätze aus Datei-Größe
      const estimatedSeconds = state.audioBlob.size / 16000;
      duration = Math.max(10, estimatedSeconds);
      console.log('⚠️ Audio-Duration geschätzt aus Größe:', duration);
    }
    
    state.audioDuration = duration;
    URL.revokeObjectURL(tempUrl);
    console.log(`✅ Audio-Duration (Fallback): ${state.audioDuration.toFixed(2)}s`);
  }
  
  if (state.wordTimings.length === 0) {
    const fullText = state.story.hook + ' ' + state.story.scenes.map(s => s.narration.replace(/\[STIMME2\]|\[\/STIMME2\]/g, '')).join(' ');
    state.wordTimings = estimateWordTimings(fullText, state.audioDuration);
  }
}

function parseWordTimings(text, alignment) {
  const chars = alignment.characters;
  const starts = alignment.character_start_times_seconds;
  const ends = alignment.character_end_times_seconds;
  
  const words = [];
  let currentWord = '';
  let wordStart = 0;
  
  for (let i = 0; i < chars.length; i++) {
    const char = chars[i];
    if (char === ' ' || char === '\n') {
      if (currentWord) {
        words.push({ word: currentWord, start: wordStart, end: ends[i - 1] || ends[i] });
        currentWord = '';
      }
    } else {
      if (!currentWord) wordStart = starts[i];
      currentWord += char;
    }
  }
  if (currentWord) {
    words.push({ word: currentWord, start: wordStart, end: ends[ends.length - 1] });
  }
  
  return words;
}

function estimateWordTimings(text, totalDuration) {
  const words = text.split(/\s+/).filter(w => w);
  if (words.length === 0) return [];
  
  // BESSERE SCHÄTZUNG: Längere Wörter brauchen mehr Zeit
  // Berechne Wort-Gewichte basierend auf Zeichenzahl (Silben-Approximation)
  const weights = words.map(w => {
    const len = w.length;
    // Gewicht: kurze Wörter (1-3 Zeichen) ~ 1, lange Wörter (10+) ~ 2.5
    return Math.max(0.6, Math.min(2.5, len / 5 + 0.5));
  });
  
  const totalWeight = weights.reduce((a, b) => a + b, 0);
  
  // Padding am Anfang (Pause vor erstem Wort) und Ende
  const startPad = 0.1;
  const endPad = 0.15;
  const speakingTime = Math.max(0.5, totalDuration - startPad - endPad);
  
  const timings = [];
  let currentTime = startPad;
  
  for (let i = 0; i < words.length; i++) {
    const wordTime = (weights[i] / totalWeight) * speakingTime;
    timings.push({
      word: words[i],
      start: currentTime,
      end: currentTime + wordTime
    });
    currentTime += wordTime;
  }
  
  return timings;
}

async function generateMedia() {
  state.media = [];
  
  // Generische Horror-Begriffe als Default-Fallback
  const horrorFallbacks = ['dark', 'night', 'fog', 'shadow', 'forest dark', 'empty room', 'abandoned', 'rain'];
  
  for (let i = 0; i < state.story.scenes.length; i++) {
    const scene = state.story.scenes[i];
    let mediaItem = null;
    
    setStatus(`🎬 Szene ${i + 1}/${state.story.scenes.length}...`, 35 + ((i / state.story.scenes.length) * 28));
    
    if (state.pexelsKey) {
      // Suchbegriffe sammeln: erst die spezifischen aus der Story, dann generische Fallbacks
      const searches = [];
      if (scene.pexelsSearches && Array.isArray(scene.pexelsSearches)) {
        searches.push(...scene.pexelsSearches);
      } else if (scene.pexelsSearch) {
        searches.push(scene.pexelsSearch);
      }
      // Generische Fallbacks anhängen
      searches.push(horrorFallbacks[i % horrorFallbacks.length]);
      searches.push('dark atmosphere');
      
      // Durchprobieren bis was gefunden wird
      for (const query of searches) {
        const pexelsVideo = await searchPexelsVideo(query);
        if (pexelsVideo) {
          try {
            const response = await fetch(pexelsVideo.url);
            const blob = await response.blob();
            mediaItem = { url: URL.createObjectURL(blob), blob, type: 'video' };
            break;
          } catch (err) {}
        }
      }
    }
    
    if (!mediaItem) {
      const prompt = encodeURIComponent(scene.imagePrompt + ', vertical 9:16, cinematic horror, dark moody atmosphere, photorealistic, film grain, dramatic lighting');
      const seed = Math.floor(Math.random() * 1000000);
      const url = `https://image.pollinations.ai/prompt/${prompt}?width=720&height=1280&seed=${seed}&nologo=true&model=flux`;
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        mediaItem = { url: URL.createObjectURL(blob), blob, type: 'image' };
      } catch (err) {
        throw new Error(`Bild ${i+1} konnte nicht geladen werden`);
      }
    }
    
    state.media.push(mediaItem);
    render();
  }
}

// Web-Audio Horror-Drone – AUFGETEILT in Setup + Start für sync mit Recording
function setupHorrorDroneNodes(audioContext, destination) {
  // ═══ LAYER 1: Tiefer Bass-Drone (Grundton, unheilvoll) ═══
  const bassFreq = 55; // A1
  const bass1 = audioContext.createOscillator();
  bass1.type = 'sawtooth';
  bass1.frequency.value = bassFreq;
  
  const bass2 = audioContext.createOscillator();
  bass2.type = 'sine';
  bass2.frequency.value = bassFreq * 1.005;
  
  // ═══ LAYER 2: Dissonante Quinte ═══
  const fifth = audioContext.createOscillator();
  fifth.type = 'sine';
  fifth.frequency.value = 73.42;
  
  // ═══ LAYER 3: Hoher Drone ═══
  const high1 = audioContext.createOscillator();
  high1.type = 'sine';
  high1.frequency.value = 220;
  
  const high2 = audioContext.createOscillator();
  high2.type = 'sine';
  high2.frequency.value = 220 * 1.003;
  
  // ═══ LAYER 4: Wind-Noise ═══
  const noiseBuffer = audioContext.createBuffer(1, audioContext.sampleRate * 2, audioContext.sampleRate);
  const noiseData = noiseBuffer.getChannelData(0);
  for (let i = 0; i < noiseData.length; i++) {
    noiseData[i] = (Math.random() * 2 - 1) * 0.3;
  }
  const noise = audioContext.createBufferSource();
  noise.buffer = noiseBuffer;
  noise.loop = true;
  
  const noiseFilter = audioContext.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 600;
  noiseFilter.Q.value = 0.8;
  
  // ═══ LFOs ═══
  const lfo = audioContext.createOscillator();
  lfo.frequency.value = 0.12;
  const lfoGain = audioContext.createGain();
  lfoGain.gain.value = 4;
  lfo.connect(lfoGain);
  lfoGain.connect(bass1.frequency);
  
  const lfo2 = audioContext.createOscillator();
  lfo2.frequency.value = 0.08;
  const lfo2Gain = audioContext.createGain();
  lfo2Gain.gain.value = 2;
  lfo2.connect(lfo2Gain);
  lfo2Gain.connect(high1.frequency);
  
  // ═══ FILTER ═══
  const lowFilter = audioContext.createBiquadFilter();
  lowFilter.type = 'lowpass';
  lowFilter.frequency.value = 280;
  lowFilter.Q.value = 4;
  
  const highFilter = audioContext.createBiquadFilter();
  highFilter.type = 'lowpass';
  highFilter.frequency.value = 800;
  highFilter.Q.value = 2;
  
  // ═══ GAINS pro Layer (lauter als vorher!) ═══
  const bassGain = audioContext.createGain();
  bassGain.gain.value = 0.7;
  
  const fifthGain = audioContext.createGain();
  fifthGain.gain.value = 0.35;
  
  const highGain = audioContext.createGain();
  highGain.gain.value = 0.18;
  
  const noiseGain = audioContext.createGain();
  noiseGain.gain.value = 0.12;
  
  // ═══ REVERB ═══
  const reverb = audioContext.createConvolver();
  reverb.buffer = createReverbBuffer(audioContext, 4, 2.5);
  const reverbGain = audioContext.createGain();
  reverbGain.gain.value = 0.4;
  
  // ═══ MASTER ═══
  const masterGain = audioContext.createGain();
  masterGain.gain.value = 0;
  
  // ═══ ROUTING ═══
  bass1.connect(bassGain);
  bass2.connect(bassGain);
  bassGain.connect(lowFilter);
  
  fifth.connect(fifthGain);
  fifthGain.connect(lowFilter);
  
  high1.connect(highGain);
  high2.connect(highGain);
  highGain.connect(highFilter);
  
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(highFilter);
  
  lowFilter.connect(masterGain);
  highFilter.connect(masterGain);
  lowFilter.connect(reverb);
  highFilter.connect(reverb);
  reverb.connect(reverbGain);
  reverbGain.connect(masterGain);
  
  // WICHTIG: Master geht an destination (= MediaStreamDestination)
  masterGain.connect(destination);
  
  return {
    oscillators: [bass1, bass2, fifth, high1, high2, lfo, lfo2],
    bufferSources: [noise],
    masterGain: masterGain
  };
}

function startHorrorDrone(audioContext, nodes, duration) {
  const now = audioContext.currentTime;
  
  // Master-Gain Envelope (Fade-In, Halten, Fade-Out)
  // LAUTER: 0.35 statt 0.22
  nodes.masterGain.gain.setValueAtTime(0, now);
  nodes.masterGain.gain.linearRampToValueAtTime(0.35, now + 1.2);
  nodes.masterGain.gain.setValueAtTime(0.35, now + duration - 1.5);
  nodes.masterGain.gain.linearRampToValueAtTime(0, now + duration);
  
  // Alle Oszillatoren starten
  nodes.oscillators.forEach(osc => {
    try {
      osc.start(now);
      osc.stop(now + duration + 0.1);
    } catch (e) {}
  });
  
  // Buffer-Sources (Noise) starten
  nodes.bufferSources.forEach(src => {
    try {
      src.start(now);
      src.stop(now + duration + 0.1);
    } catch (e) {}
  });
}

function createReverbBuffer(audioContext, duration, decay) {
  const sampleRate = audioContext.sampleRate;
  const length = sampleRate * duration;
  const impulse = audioContext.createBuffer(2, length, sampleRate);
  for (let channel = 0; channel < 2; channel++) {
    const channelData = impulse.getChannelData(channel);
    for (let i = 0; i < length; i++) {
      channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return impulse;
}

async function generateCover() {
  let baseElement = null;
  let isVideo = false;
  
  if (state.media[0]) {
    if (state.media[0].type === 'image') {
      baseElement = new Image();
      baseElement.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        baseElement.onload = res;
        baseElement.onerror = rej;
        baseElement.src = state.media[0].url;
      });
    } else {
      const video = document.createElement('video');
      video.src = state.media[0].url;
      video.muted = true;
      video.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        video.onloadeddata = () => { video.currentTime = video.duration / 2; };
        video.onseeked = res;
        video.onerror = rej;
        setTimeout(rej, 5000);
      });
      baseElement = video;
      isVideo = true;
    }
  }
  
  const canvas = document.createElement('canvas');
  canvas.width = 720;
  canvas.height = 1280;
  const ctx = canvas.getContext('2d');
  
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  if (baseElement) {
    const mediaW = isVideo ? baseElement.videoWidth : baseElement.width;
    const mediaH = isVideo ? baseElement.videoHeight : baseElement.height;
    const ratio = mediaW / mediaH;
    const canvasRatio = canvas.width / canvas.height;
    let dw, dh, dx, dy;
    if (ratio > canvasRatio) {
      dh = canvas.height;
      dw = dh * ratio;
    } else {
      dw = canvas.width;
      dh = dw / ratio;
    }
    dx = (canvas.width - dw) / 2;
    dy = (canvas.height - dh) / 2;
    ctx.drawImage(baseElement, dx, dy, dw, dh);
  }
  
  const topGrad = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.5);
  topGrad.addColorStop(0, 'rgba(0,0,0,0.85)');
  topGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height * 0.5);
  
  const botGrad = ctx.createLinearGradient(0, canvas.height * 0.6, 0, canvas.height);
  botGrad.addColorStop(0, 'rgba(0,0,0,0)');
  botGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = botGrad;
  ctx.fillRect(0, canvas.height * 0.6, canvas.width, canvas.height * 0.4);
  
  const vGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height/3, canvas.width/2, canvas.height/2, canvas.height/1.1);
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, 'rgba(0,0,0,0.7)');
  ctx.fillStyle = vGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Hook-Text dynamisch zentriert in oberen 2/3, Branding fest im unteren 1/4
  // Cover-Text säubern: Hashtags raus, mehrfache Spaces fixen
  let coverText = state.story.tiktokTitle || state.story.hook;
  coverText = cleanCoverText(coverText);
  
  drawCoverText(ctx, coverText, canvas.width, canvas.height);
  
  const branding = state.brandName;
  
  // NACHTZEUGE-Branding: KLEIN + TRANSPARENT, damit der Hook König bleibt
  if (branding) {
    // Kleinere Schrift, mehr im Hintergrund
    let brandFontSize = 18;
    if (branding.length > 25) brandFontSize = 16;
    if (branding.length > 35) brandFontSize = 14;
    
    ctx.font = `${brandFontSize}px Arial, sans-serif`;
    ctx.textAlign = 'center';
    
    // Branding ganz unten, sehr dezent
    const brandY = canvas.height - 35;
    
    // Schatten für Lesbarkeit (kein voller Hintergrund-Streifen mehr)
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.strokeText(branding, canvas.width / 2, brandY);
    
    // Branding-Text: transparenter (60% Opacity)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.fillText(branding, canvas.width / 2, brandY);
  }
  
  // ✗ TAP TO WATCH wurde entfernt – wirkt clean und professionell wie echte TikToker
  
  state.coverBlob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.92));
  state.coverUrl = URL.createObjectURL(state.coverBlob);
}

function cleanCoverText(text) {
  if (!text) return '';
  
  // Hashtags entfernen
  let cleaned = text.replace(/#[\wäöüÄÖÜß]+/g, '');
  // URLs entfernen
  cleaned = cleaned.replace(/https?:\/\/\S+/g, '');
  // @Mentions entfernen
  cleaned = cleaned.replace(/@\w+/g, '');
  // Mehrfache Spaces zu einem
  cleaned = cleaned.replace(/\s+/g, ' ').trim();
  // Leere Satzzeichen aufräumen
  cleaned = cleaned.replace(/\s+([.!?,;])/g, '$1').trim();
  
  // Fallback wenn leer
  if (cleaned.length < 5) {
    return state.story.hook || 'HORROR';
  }
  return cleaned;
}

function drawCoverText(ctx, text, w, h) {
  const maxWidth = w * 0.85;
  
  // RESERVIERTER BEREICH: Hook-Text darf jetzt 0.10*h bis 0.85*h nutzen
  // (Branding wurde dezenter + TAP TO WATCH entfernt → mehr Platz für den Hook!)
  const topY = h * 0.10;
  const maxBottomY = h * 0.85;
  const availableHeight = maxBottomY - topY;
  
  // DYNAMISCHE FONT-GRÖSSE basierend auf Text-Länge
  // Kürzere Texte = noch GRÖSSERE Schrift (weil mehr Platz)
  const textLen = text.length;
  let fontSize;
  if (textLen <= 15) fontSize = 110;      // Ultra kurz: MASSIV groß (z.B. "ER KAM JEDE NACHT.")
  else if (textLen <= 25) fontSize = 96;  // Sehr kurz: extra groß
  else if (textLen <= 40) fontSize = 82;  // Kurz: groß
  else if (textLen <= 60) fontSize = 68;  // Mittel: mittel
  else if (textLen <= 85) fontSize = 58;  // Lang: kleiner
  else fontSize = 48;                     // Sehr lang: klein
  
  // Funktion zum Zeilen-Aufteilen mit gegebener Schrift
  function calculateLines(size) {
    ctx.font = `900 ${size}px Impact, Arial Black, sans-serif`;
    const words = text.split(' ');
    const lines = [];
    let currentLine = '';
    for (const word of words) {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      if (ctx.measureText(testLine).width > maxWidth && currentLine) {
        lines.push(currentLine.toUpperCase());
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    }
    if (currentLine) lines.push(currentLine.toUpperCase());
    return lines;
  }
  
  // Zeilen berechnen, ggf. Schrift verkleinern bis es passt
  let lines = calculateLines(fontSize);
  let lineHeight = fontSize * 1.05;
  let totalHeight = lines.length * lineHeight;
  
  // Wenn Gesamthöhe zu groß: Schrift verkleinern
  while (totalHeight > availableHeight && fontSize > 32) {
    fontSize -= 4;
    lines = calculateLines(fontSize);
    lineHeight = fontSize * 1.05;
    totalHeight = lines.length * lineHeight;
  }
  
  // Vertikal zentriert im verfügbaren Bereich
  const startY = topY + (availableHeight - totalHeight) / 2 + fontSize * 0.85;
  
  ctx.font = `900 ${fontSize}px Impact, Arial Black, sans-serif`;
  ctx.textAlign = 'center';
  
  for (let i = 0; i < lines.length; i++) {
    const y = startY + (i * lineHeight);
    
    // Outline (schwarz, dick)
    ctx.strokeStyle = '#000';
    ctx.lineWidth = Math.max(8, fontSize / 8);
    ctx.lineJoin = 'round';
    ctx.miterLimit = 2;
    ctx.strokeText(lines[i], w / 2, y);
    
    // Text mit rotem Glow
    ctx.shadowColor = 'rgba(180, 0, 0, 0.9)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#fff';
    ctx.fillText(lines[i], w / 2, y);
    ctx.shadowBlur = 0;
  }
}

async function renderFinalVideo() {
  const canvas = document.createElement('canvas');
  canvas.width = 720;
  canvas.height = 1280;
  const ctx = canvas.getContext('2d');
  
  // Medien laden
  const loadedMedia = [];
  for (let i = 0; i < state.media.length; i++) {
    const item = state.media[i];
    if (item.type === 'video') {
      const video = document.createElement('video');
      video.src = item.url;
      video.muted = true;
      video.loop = true;
      video.playsInline = true;
      video.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        video.onloadeddata = res;
        video.onerror = rej;
        setTimeout(rej, 10000);
      });
      loadedMedia.push({ type: 'video', element: video });
    } else {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = rej;
        img.src = item.url;
      });
      loadedMedia.push({ type: 'image', element: img });
    }
  }
  
  setStatus('🎥 Video wird aufgenommen...', 85);
  
  const stream = canvas.captureStream(30);
  
  // Audio Setup
  const audioContext = new AudioContext();
  const audioUrl = URL.createObjectURL(state.audioBlob);
  const audioElement = new Audio(audioUrl);
  audioElement.crossOrigin = 'anonymous';
  audioElement.loop = false; // WICHTIG: Stimme darf NICHT loopen
  audioElement.preload = 'auto';
  await new Promise(r => { audioElement.oncanplaythrough = r; audioElement.load(); });
  
  const source = audioContext.createMediaElementSource(audioElement);
  const dest = audioContext.createMediaStreamDestination();
  
  // Hauptstimme: laut
  const voiceGain = audioContext.createGain();
  voiceGain.gain.value = 1.0;
  source.connect(voiceGain);
  voiceGain.connect(dest);
  voiceGain.connect(audioContext.destination);
  
  // Hintergrundmusik – wird ERST nach recorder.start() gestartet für sync
  let musicElement = null;
  let musicUrl = null;
  let synthNodes = null;
  let synthScheduled = false;
  
  if (state.useMusic) {
    if (state.musicBlob && state.musicType === 'audio') {
      try {
        musicUrl = URL.createObjectURL(state.musicBlob);
        musicElement = new Audio(musicUrl);
        musicElement.crossOrigin = 'anonymous';
        musicElement.loop = true;
        musicElement.preload = 'auto';
        await new Promise((resolve) => { 
          musicElement.oncanplaythrough = resolve;
          musicElement.onerror = resolve;
          musicElement.load(); 
          setTimeout(resolve, 3000);
        });
        
        const musicSource = audioContext.createMediaElementSource(musicElement);
        const musicGain = audioContext.createGain();
        musicGain.gain.value = 0.22;
        musicSource.connect(musicGain);
        musicGain.connect(dest);
      } catch (err) {
        console.log('Music file failed, switching to synth:', err);
        state.musicType = 'synth';
        musicElement = null;
      }
    }
    
    // Synth-Setup – Nodes JETZT erstellen aber noch nicht starten
    if (state.musicType === 'synth' || (!musicElement && state.useMusic)) {
      synthNodes = setupHorrorDroneNodes(audioContext, dest);
    }
  }
  
  dest.stream.getAudioTracks().forEach(track => stream.addTrack(track));
  
  // AudioContext aufwecken falls suspended (Browser-Sicherheit)
  if (audioContext.state === 'suspended') {
    await audioContext.resume();
  }
  
  // ⚠️ WICHTIG: Wir nutzen ABSICHTLICH NUR WebM beim Rendering!
  // 
  // Android Chrome behauptet zwar MP4 zu unterstützen (mit AAC),
  // packt aber heimlich OPUS-Audio in den Container.
  // Diese MP4s werden von TikTok abgelehnt ("Dekodieren nicht möglich").
  //
  // Stattdessen: WebM (mit Opus) → später via FFmpeg zu echtem MP4 (mit AAC) konvertieren.
  let mimeType = '';
  let outputExtension = 'webm';
  
  const webmOptions = [
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm'
  ];
  for (const webm of webmOptions) {
    if (MediaRecorder.isTypeSupported(webm)) {
      mimeType = webm;
      break;
    }
  }
  
  // Format global speichern
  state.videoFormat = outputExtension;
  console.log(`📹 Video-Format: ${mimeType} → .${outputExtension} (wird später via FFmpeg zu MP4 konvertiert)`);
  
  const recorder = new MediaRecorder(stream, { 
    mimeType: mimeType,
    videoBitsPerSecond: 5000000
  });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  
  const recordingDone = new Promise(resolve => {
    recorder.onstop = () => resolve(new Blob(chunks, { type: mimeType }));
  });
  
  recorder.start();
  audioElement.play();
  if (musicElement) musicElement.play().catch(() => {});
  
  // Synth-Drone JETZT starten (synchron mit Recording)
  if (synthNodes && !synthScheduled) {
    startHorrorDrone(audioContext, synthNodes, state.audioDuration + 1);
    synthScheduled = true;
  }
  
  // Audio-Ende-Listener: stoppt sofort wenn Audio durch ist
  // ABER: Nur wenn wirklich mindestens 90% durch sind (Android-Bug-Fix)
  let audioEnded = false;
  audioElement.addEventListener('ended', () => {
    // Schutz gegen False-Positives auf Android Chrome
    // (Manchmal feuert 'ended' zu früh bei gemischtem Audio)
    if (audioElement.currentTime >= state.audioDuration * 0.9 || 
        audioElement.currentTime >= state.audioDuration - 1) {
      audioEnded = true;
      console.log(`✓ Audio ended bei ${audioElement.currentTime.toFixed(2)}s / ${state.audioDuration.toFixed(2)}s`);
    } else {
      console.log(`⚠️ Audio 'ended' Event zu früh bei ${audioElement.currentTime.toFixed(2)}s - ignoriere`);
      // Versuche fortzusetzen
      audioElement.play().catch(() => {});
    }
  });
  
  const totalDuration = state.audioDuration;
  const startTime = performance.now();
  const totalMs = totalDuration * 1000;
  
  function drawFrame() {
    const elapsed = performance.now() - startTime;
    const progress = elapsed / totalMs;
    const currentTime = elapsed / 1000;
    
    // Stoppe wenn Audio zu Ende ODER Zeit abgelaufen
    if (progress >= 1 || audioEnded) {
      recorder.stop();
      audioElement.pause();
      if (musicElement) musicElement.pause();
      loadedMedia.forEach(m => { if (m.type === 'video') m.element.pause(); });
      return;
    }
    
    const sceneIndex = Math.min(Math.floor(progress * state.media.length), state.media.length - 1);
    const sceneProgress = (progress * state.media.length) % 1;
    
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    const media = loadedMedia[sceneIndex];
    const element = media.element;
    
    if (media.type === 'video' && element.paused) {
      element.currentTime = 0;
      element.play().catch(() => {});
    }
    
    const mediaW = media.type === 'video' ? element.videoWidth : element.width;
    const mediaH = media.type === 'video' ? element.videoHeight : element.height;
    
    if (mediaW && mediaH) {
      // KEN-BURNS-EFFEKT: stärkerer Zoom + horizontaler Drift für lebendige Bilder
      let zoom, offsetX, offsetY;
      
      if (media.type === 'video') {
        // Videos: leichter Zoom, kein Drift (Video bewegt sich selbst)
        zoom = 1.08; // Leicht stärkerer Video-Zoom für mehr Präsenz
        offsetX = 0;
        offsetY = 0;
      } else {
        // STÄRKERER Ken-Burns für mehr Bewegung (TikTok-Optimierung)
        const isEven = sceneIndex % 2 === 0;
        zoom = 1.08 + (sceneProgress * 0.25); // 1.08 → 1.33 (deutlich stärkerer Zoom)
        offsetX = isEven 
          ? -sceneProgress * 45  // pan nach links (war 30)
          : sceneProgress * 45;  // pan nach rechts (war 30)
        offsetY = -sceneProgress * 15; // leicht nach oben (war 10)
      }
      
      // INTENSIVERES Found-Footage-Wackeln (sichtbarer, lebendiger)
      const shake = Math.sin(elapsed * 0.008) * 2.5 + Math.cos(elapsed * 0.011) * 2.0; // war 0.005 * 1.5
      const shakeY = Math.sin(elapsed * 0.007) * 2.5; // war 0.004 * 1.5
      
      // PUNCH-EFFEKT: am Anfang jeder Szene ein kurzer Zoom-Stoß (TikTok-Trick für mehr Watchtime)
      let punchZoom = 1;
      if (sceneProgress < 0.15) {
        // Erste 15% der Szene: sanfter Punch-In von 1.15 auf 1.0
        punchZoom = 1 + (0.10 * (1 - sceneProgress / 0.15));
      }
      zoom *= punchZoom;
      
      const ratio = mediaW / mediaH;
      const canvasRatio = canvas.width / canvas.height;
      let dw, dh, dx, dy;
      if (ratio > canvasRatio) {
        dh = canvas.height * zoom;
        dw = dh * ratio;
      } else {
        dw = canvas.width * zoom;
        dh = dw / ratio;
      }
      dx = (canvas.width - dw) / 2 + offsetX + shake;
      dy = (canvas.height - dh) / 2 + offsetY + shakeY;
      ctx.drawImage(element, dx, dy, dw, dh);
    }
    
    // Schwarzblende – ULTRA-KURZ für sofortigen Hook (TikTok-Optimierung)
    // Nur erste Szene hat kein Fade-In, damit Hook SOFORT startet
    const isFirstScene = (progress * state.media.length) < 1;
    const fadeTime = 0.05; // Halbiert: war 0.1
    
    // Fade-In nur ab Szene 2 (erste Szene startet ohne schwarzen Übergang)
    if (sceneProgress < fadeTime && !isFirstScene) {
      ctx.fillStyle = `rgba(0,0,0,${1 - sceneProgress / fadeTime})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } else if (sceneProgress > 1 - fadeTime) {
      ctx.fillStyle = `rgba(0,0,0,${(sceneProgress - (1 - fadeTime)) / fadeTime})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    
    // Vignette
    const grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.height/3, canvas.width/2, canvas.height/2, canvas.height/1.2);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(0,0,0,0.6)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // ANIMIERTE UNTERTITEL (Wort für Wort)
    drawAnimatedSubtitle(ctx, currentTime, canvas.width, canvas.height);
    
    const renderProgress = 85 + (progress * 14);
    if (Math.floor(progress * 100) % 5 === 0) {
      state.progress = renderProgress;
      render();
    }
    
    requestAnimationFrame(drawFrame);
  }
  
  requestAnimationFrame(drawFrame);
  
  state.videoBlob = await recordingDone;
  state.videoUrl = URL.createObjectURL(state.videoBlob);
  URL.revokeObjectURL(audioUrl);
  if (musicUrl) URL.revokeObjectURL(musicUrl);
}

function drawAnimatedSubtitle(ctx, currentTime, w, h) {
  if (!state.wordTimings || state.wordTimings.length === 0) return;
  
  // ROBUSTE Wort-Findung: 3 Strategien
  let activeIdx = -1;
  
  // Strategie 1: Wort ist GERADE aktiv (currentTime liegt zwischen start und end)
  for (let i = 0; i < state.wordTimings.length; i++) {
    const wt = state.wordTimings[i];
    if (currentTime >= wt.start && currentTime <= wt.end + 0.05) {
      activeIdx = i;
      break;
    }
  }
  
  // Strategie 2: Wenn keine genaue Übereinstimmung – nimm das NÄCHSTE noch nicht gesprochene Wort
  if (activeIdx === -1) {
    for (let i = 0; i < state.wordTimings.length; i++) {
      if (currentTime < state.wordTimings[i].start) {
        activeIdx = i;
        break;
      }
    }
  }
  
  // Strategie 3: Wenn currentTime BEYOND letztes Wort – nimm das letzte Wort als aktiv
  if (activeIdx === -1 && state.wordTimings.length > 0) {
    activeIdx = state.wordTimings.length - 1;
  }
  
  // Sicherheits-Fallback
  if (activeIdx === -1 || activeIdx >= state.wordTimings.length) return;
  
  // Phrase um aktuelles Wort (4-5 Wörter sichtbar)
  const phraseSize = 4;
  let phraseStart = Math.max(0, activeIdx - 1);
  let phraseEnd = Math.min(state.wordTimings.length, phraseStart + phraseSize);
  
  // Wenn Ende erreicht: zeig die letzten 4 Wörter
  if (phraseEnd === state.wordTimings.length) {
    phraseStart = Math.max(0, phraseEnd - phraseSize);
  }
  
  const phraseWords = state.wordTimings.slice(phraseStart, phraseEnd);
  
  const fontSize = 56;
  ctx.font = `900 ${fontSize}px Impact, Arial Black, sans-serif`;
  ctx.textAlign = 'center';
  
  const maxWidth = w * 0.88;
  const lines = [[]];
  let currentLineWidth = 0;
  const spaceWidth = ctx.measureText(' ').width;
  
  for (const wt of phraseWords) {
    const wordWidth = ctx.measureText(wt.word.toUpperCase()).width;
    if (currentLineWidth + wordWidth > maxWidth && lines[lines.length - 1].length > 0) {
      lines.push([]);
      currentLineWidth = 0;
    }
    lines[lines.length - 1].push({ ...wt, width: wordWidth });
    currentLineWidth += wordWidth + spaceWidth;
  }
  
  const lineHeight = fontSize * 1.15;
  const startY = h * 0.7;
  
  // Schlüsselwörter erkennen für ROT-Highlights
  const dramaticWords = /\b(NIE|NIEMAND|TOD|TOT|ANGST|BLUT|SCHREI|DUNKEL|NACHT|VERSCHWAND|VERSCHWANDEN|GEFUNDEN|MORD|MORDET|GETÖTET|HORROR|KEINER|NIEMALS|GEHEIMNIS|LEICHE|GEIST|TEUFEL|STERBEN|GESTORBEN|BÖSE|GRAB|HÖLLE|DÄMON|BLUTIG|SCHATTEN|UNHEIMLICH|GRAUSAM|WUSSTEST|SCHOCKIEREND|UNGLAUBLICH|MILLIONEN|MILLIARDEN|GIGANTISCH|GEHEIM|VERBOTEN|VERSCHWUNDEN|RÄTSEL|MYSTERIUM|VERFLUCHT)\b/i;
  
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const lineY = startY + (li * lineHeight);
    
    let lineWidth = 0;
    line.forEach(wd => lineWidth += wd.width);
    lineWidth += spaceWidth * (line.length - 1);
    
    let x = (w - lineWidth) / 2;
    
    for (const wordObj of line) {
      const wordCenter = x + wordObj.width / 2;
      const wordIdx = state.wordTimings.indexOf(wordObj);
      const isActive = wordIdx === activeIdx;
      const isPast = wordIdx < activeIdx;
      const isDramatic = dramaticWords.test(wordObj.word.toUpperCase());
      
      let scale = 1;
      let glow = 0;
      let color = '#fff';
      let glowColor = 'rgba(180, 0, 0, 0.9)';
      let rotation = 0;
      
      if (isActive) {
        const wordDur = Math.max(0.001, wordObj.end - wordObj.start);
        const wordProgress = Math.max(0, Math.min(1, (currentTime - wordObj.start) / wordDur));
        
        // POP-IN ANIMATION
        if (wordProgress < 0.25) {
          const popPhase = wordProgress / 0.25;
          scale = 0.7 + (Math.sin(popPhase * Math.PI / 2) * 0.5);
        } else if (wordProgress < 0.4) {
          const settlePhase = (wordProgress - 0.25) / 0.15;
          scale = 1.2 - (settlePhase * 0.2);
        } else {
          scale = 1.0;
        }
        
        // FARBE: Rot bei dramatischen Wörtern, sonst weiß mit rotem Glow
        if (isDramatic) {
          color = '#ff3030';
          glowColor = 'rgba(255, 50, 50, 1)';
          glow = 35;
          rotation = Math.sin(wordProgress * Math.PI * 8) * 0.03;
        } else {
          color = '#ffffff';
          glow = 25;
        }
      } else if (isPast) {
        // Schon gesprochen - dunkler aber je nach Wichtigkeit
        if (isDramatic) {
          color = 'rgba(255, 60, 60, 0.7)';
        } else {
          color = 'rgba(232, 216, 200, 0.55)';
        }
      } else {
        // Noch nicht gesprochen
        color = 'rgba(232, 216, 200, 0.5)';
      }
      
      ctx.save();
      ctx.translate(wordCenter, lineY);
      if (rotation !== 0) ctx.rotate(rotation);
      ctx.scale(scale, scale);
      
      // Outline
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 10;
      ctx.lineJoin = 'round';
      ctx.miterLimit = 2;
      ctx.strokeText(wordObj.word.toUpperCase(), 0, 0);
      
      // Glow
      if (glow > 0) {
        ctx.shadowColor = glowColor;
        ctx.shadowBlur = glow;
      }
      
      ctx.fillStyle = color;
      ctx.fillText(wordObj.word.toUpperCase(), 0, 0);
      ctx.shadowBlur = 0;
      
      ctx.restore();
      
      x += wordObj.width + spaceWidth;
    }
  }
}

function buildFilename(suffix, extension) {
  // Branding-Präfix aus state.brandName extrahieren (z.B. "🐦‍⬛ NACHTZEUGE" → "NACHTZEUGE")
  const brandText = (state.brandName || 'NACHTZEUGE')
    .replace(/[^\wäöüÄÖÜß ]/g, '') // Emojis raus
    .trim()
    .split(' ')
    .filter(w => w.length > 0)
    .join('_')
    .toUpperCase();
  
  // Teil-Nummer ermitteln (falls Fortsetzung)
  let partPrefix = '';
  if (state.parentStoryId) {
    const parent = state.library.find(e => e.id === state.parentStoryId);
    if (parent) {
      const partNum = (parent.part || 1) + 1;
      partPrefix = `_Teil${partNum}`;
    }
  } else if (state.story.tiktokTitle && /Teil\s*(\d+)/i.test(state.story.tiktokTitle)) {
    const match = state.story.tiktokTitle.match(/Teil\s*(\d+)/i);
    if (match) partPrefix = `_Teil${match[1]}`;
  }
  
  // Titel säubern: nur Buchstaben + Zahlen, Unterstriche
  const title = (state.story.title || 'Story')
    .replace(/[äÄ]/g, 'ae')
    .replace(/[öÖ]/g, 'oe')
    .replace(/[üÜ]/g, 'ue')
    .replace(/[ß]/g, 'ss')
    .replace(/[^a-z0-9]/gi, '_')
    .replace(/_+/g, '_')
    .replace(/^_|_$/g, '')
    .substring(0, 40); // Max 40 Zeichen für lesbare Dateinamen
  
  // Zusammensetzen: BRAND_TeilX_Titel_SUFFIX.ext
  return `${brandText}${partPrefix}_${title}_${suffix}.${extension}`;
}

function downloadAsMp4Renamed() {
  if (!state.videoUrl) return;
  // TRICK: WebM-Datei mit .mp4-Endung speichern

  // Web-Upload manchmal nicht – aber App fast immer
  const a = document.createElement('a');
  a.href = state.videoUrl;
  a.download = buildFilename('VIDEO', 'mp4');
  a.click();
  
  // Erfolgs-Hinweis
  const errEl = document.getElementById('error');
  errEl.style.background = 'rgba(0,139,0,0.2)';

function saveToLibrary() {
  const parent = state.parentStoryId ? state.library.find(e => e.id === state.parentStoryId) : null;
  const part = parent ? (parent.part || 1) + 1 : 1;
  
  const entry = {
    id: Date.now().toString(),
    date: new Date().toISOString(),
    title: state.story.title,
    genre: state.genre,
    length: state.length,
    series: state.series,
    part: part,
    parentId: state.parentStoryId,
    story: state.story
  };
  
  state.library = [entry, ...state.library].slice(0, 50); // max 50 Stories (sicherer für mobile)
  Storage.setLibrary(state.library);
  
  // Warnung wenn Library 80%+ voll
  if (state.library.length >= 40) {
    console.warn(`⚠️ Bibliothek bei ${state.library.length}/50 Einträgen - bald voll!`);
  }
}

function render() {
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === state.view);
  });
  
  const c = document.getElementById('content');
  if (state.view === 'home') c.innerHTML = renderHome();
  else if (state.view === 'settings') c.innerHTML = renderSettings();
  else if (state.view === 'library') c.innerHTML = renderLibrary();
  else if (state.view === 'generator') {
    if (state.step === 'setup') c.innerHTML = renderSetup();
    else if (state.step === 'running') c.innerHTML = renderRunning();
    else if (state.step === 'hookSelection') c.innerHTML = renderHookSelection();
    else if (state.step === 'done') c.innerHTML = renderDone();
  }
  attachEvents();
}

async function regenerateHooks() {
  state.running = true;

  state.status = '🪝 3 neue Hooks werden generiert...';

  render();
  
  try {
    await generateHookCandidates();
    state.step = 'hookSelection';
    state.running = false;
    render();
  } catch(e) {
    showError('Hook-Generierung fehlgeschlagen');
    state.step = 'setup';
    state.running = false;
    render();
  }
